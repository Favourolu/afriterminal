name: Daily AfriTerminal Data Update

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 2pm UTC = 3pm WAT, weekdays only
    - cron: '30 14 * * 1-5' # 2:30pm UTC = 3:30pm WAT backup run
  workflow_dispatch: # allows manual trigger too

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas lxml

      - name: Run NGX live scraper
        env:
          ITICK_API_KEY: ${{ secrets.ITICK_API_KEY }}
        run: python ngx_live_scraper.py

      - name: Run FX scraper
        run: python fx_scraper.py

      - name: Run mega scraper
        run: python mega_scraper.py

      - name: Commit and push new data
        run: |
          git config --global user.email "afriterminal@auto.com"
          git config --global user.name "AfriTerminal Bot"
          git add *.csv
          git diff --staged --quiet || git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M') WAT"
          git push
