name: Daily AfriTerminal Data Update

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 07:00 UTC — pre-market
    - cron: '0 9 * * 1-5'   # 09:00 UTC — market open (NSE/EGX open)
    - cron: '0 11 * * 1-5'  # 11:00 UTC — mid-session
    - cron: '0 13 * * 1-5'  # 13:00 UTC — NGX open, near close for others
    - cron: '0 15 * * 1-5'  # 15:00 UTC — post-close update
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas lxml

      - name: Run NGX live scraper
        env:
          ITICK_API_KEY: ${{ secrets.ITICK_API_KEY }}
        run: python ngx_live_scraper.py

      - name: Run FX scraper
        run: python fx_scraper.py

      - name: Run mega scraper
        run: python mega_scraper.py

      - name: Commit and push
        run: |
          git config --global user.email "afriterminal@auto.com"
          git config --global user.name "AfriTerminal Bot"
          git add *.csv
          git diff --staged --quiet || git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M') WAT"
          git push
