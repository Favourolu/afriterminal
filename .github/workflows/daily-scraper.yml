name: Daily NGX Data Update

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 8am Lagos time, weekdays only
  workflow_dispatch:  # allows manual trigger too

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas lxml

      - name: Run NGX scraper
        run: python scraper.py

      - name: Run FX scraper
        run: python fx_scraper.py

      - name: Commit and push new data
        run: |
          git config --global user.email "afriterminal@auto.com"
          git config --global user.name "AfriTerminal Bot"
          git add *.csv
          git diff --staged --quiet || git commit -m "Auto update: NGX + FX data $(date '+%Y-%m-%d')"
          git push
